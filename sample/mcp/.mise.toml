[tools]
claude-code = "latest"
# renovate: datasource=npm depName=@upstash/context7-mcp
"claude:mcp/context7" = "2.1.4"
# renovate: datasource=npm depName=chrome-devtools-mcp
"claude:mcp/chrome-devtools" = "0.20.0"
# renovate: datasource=npm depName=shadcn
"claude:mcp/shadcn" = "4.0.6"

[tasks.test]
description = "Run integration test"
run = "bash test.sh"

[tasks.clean]
description = "Remove install artifacts and uninstall tools"
run = """
mise ls -c 2>/dev/null | awk '{print $1"@"$2}' | xargs -I{} mise uninstall {} || true
rm -rfv .mcp.json node_modules/
"""
