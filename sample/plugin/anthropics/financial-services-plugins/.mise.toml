[tools]
claude-code = "latest"
"claude:plugin/anthropics/financial-services-plugins/financial-analysis" = "latest"
"claude:plugin/anthropics/financial-services-plugins/investment-banking" = "latest"
"claude:plugin/anthropics/financial-services-plugins/equity-research" = "latest"
"claude:plugin/anthropics/financial-services-plugins/private-equity" = "latest"
"claude:plugin/anthropics/financial-services-plugins/wealth-management" = "latest"

[tasks.clean]
description = "Remove install artifacts and uninstall tools"
run = """
mise ls -c 2>/dev/null | awk '{print $1"@"$2}' | xargs -I{} mise uninstall {} || true
rm -rfv .claude/settings.json
"""

[tasks.test]
description = "Verify plugins"
run = "bash test.sh"

