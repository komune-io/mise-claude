[tools]
claude-code = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/productivity@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/sales@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/customer-support@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/product-management@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/marketing@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/legal@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/finance@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/data@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/enterprise-search@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/bio-research@knowledge-work-plugins" = "latest"
"claude:plugin/anthropics/knowledge-work-plugins/cowork-plugin-management@knowledge-work-plugins" = "latest"

[tasks.test]
description = "Run integration test"
run = "bash test.sh"

[tasks.clean]
description = "Remove install artifacts and uninstall tools"
run = """
mise ls -c 2>/dev/null | awk '{print $1"@"$2}' | xargs -I{} mise uninstall {} || true
rm -rfv .claude/settings.json
"""
