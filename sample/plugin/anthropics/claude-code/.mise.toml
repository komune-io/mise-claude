[tools]
claude-code = "latest"
"claude:plugin/anthropics/claude-code/agent-sdk-dev" = "latest"
"claude:plugin/anthropics/claude-code/claude-opus-4-5-migration" = "latest"
"claude:plugin/anthropics/claude-code/code-review" = "latest"
"claude:plugin/anthropics/claude-code/commit-commands" = "latest"
"claude:plugin/anthropics/claude-code/explanatory-output-style" = "latest"
"claude:plugin/anthropics/claude-code/feature-dev" = "latest"
"claude:plugin/anthropics/claude-code/frontend-design" = "latest"
"claude:plugin/anthropics/claude-code/hookify" = "latest"
"claude:plugin/anthropics/claude-code/learning-output-style" = "latest"
"claude:plugin/anthropics/claude-code/plugin-dev" = "latest"
"claude:plugin/anthropics/claude-code/pr-review-toolkit" = "latest"
"claude:plugin/anthropics/claude-code/ralph-wiggum" = "latest"
"claude:plugin/anthropics/claude-code/security-guidance" = "latest"

[tasks.clean]
description = "Remove install artifacts and uninstall tools"
run = """
mise ls -c 2>/dev/null | awk '{print $1"@"$2}' | xargs -I{} mise uninstall {} || true
rm -rfv .claude/settings.json
"""

[tasks.test]
description = "Verify plugins"
run = "bash test.sh"