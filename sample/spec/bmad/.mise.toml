[tools]
java = "25"
kotlin = "2.3.10"
gradle = "9.3.1"
claude-code = "latest"
"claude:spec/bmad" = "latest"

[tasks.clean]
description = "Remove install artifacts and uninstall tools"
run = """
mise ls -c 2>/dev/null | awk '{print $1"@"$2}' | xargs -I{} mise uninstall {} || true
rm -rfv .claude/ _bmad/ node_modules/
"""

[tasks.test]
description = "Verify BMAD spec"
run = "bash test.sh"
