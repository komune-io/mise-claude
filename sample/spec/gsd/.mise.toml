[tools]
java = "25"
kotlin = "2.3.10"
gradle = "9.3.1"
claude-code = "latest"
# renovate: datasource=npm depName=get-shit-done-cc
"claude:spec/gsd" = "1.22.4"

[tasks.test]
description = "Run integration test"
run = "bash test.sh"

[tasks.clean]
description = "Remove install artifacts and uninstall tools"
run = """
mise ls -c 2>/dev/null | awk '{print $1"@"$2}' | xargs -I{} mise uninstall {} || true
rm -rfv .claude/ node_modules/
"""
